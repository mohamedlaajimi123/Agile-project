name: Verify Project

on: 
  push:
    branches: [ main, data-sync-view ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          
      - name: Install Backend Dependencies
        run: |
          cd horizon-backend
          npm install