name: Verify

on: 
  push:
    branches:
      - '**'
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    # ADD THIS BLOCK TO SILENCE THE WARNINGS AND OPT-IN TO NODE 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 
        # (Note: Keep '20' here, the env variable above forces the runner to use 24)

    - name: Frontend Build & Test
      working-directory: ./frontend
      run: |
        npm install
        npm run build
        npm test

    - name: Install horizon-backend dependencies
      working-directory: ./horizon-backend
      run: npm install