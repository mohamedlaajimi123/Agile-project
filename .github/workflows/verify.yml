name: Verify Project

on: 
  push:
    branches: [ main, data-sync-view ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Use v4 for better compatibility
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # v4 handles the environment transitions much better
      
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          
      - name: Install Backend Dependencies
        run: |
          cd horizon-backend
          npm install